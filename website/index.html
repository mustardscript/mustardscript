<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MustardScript — Like JavaScript, but smaller</title>
    <meta name="description" content="A sandboxed JavaScript subset runtime. Perfect for AI to call tools as code. 43ms execution, not 1 second." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      // Apply theme before paint to prevent flash of wrong theme
      (function() {
        try {
          var stored = localStorage.getItem('mustard-theme');
          var dark = stored === 'dark' || (
            (stored === null || stored === 'system') &&
            window.matchMedia('(prefers-color-scheme: dark)').matches
          );
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"><!--ssr-outlet--></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
