name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the staged root package and matching optional prebuilt packages
        required: true
        type: boolean
        default: false
      npm-tag:
        description: npm dist-tag to use when publish is enabled
        required: true
        type: string
        default: latest

jobs:
  build:
    name: Build ${{ matrix.settings.target }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform_arch_abi: linux-x64-gnu
          - host: macos-latest
            target: aarch64-apple-darwin
            platform_arch_abi: darwin-arm64
          - host: macos-latest
            target: x86_64-apple-darwin
            platform_arch_abi: darwin-x64
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            platform_arch_abi: win32-x64-msvc
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build prebuilt addon
        run: >
          npx napi build --release --platform
          --target ${{ matrix.settings.target }}
          --manifest-path crates/mustard-node/Cargo.toml
          --js-package-name mustardscript
          --output-dir artifacts
          --no-js
        shell: bash

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: prebuilt-${{ matrix.settings.platform_arch_abi }}
          path: artifacts/index.*.node
          if-no-files-found: error

  stage:
    name: Stage and Verify Prebuilt Packages
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create optional package directories
        run: npm run prebuilt:dirs

      - name: Download prebuilt artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: prebuilt-*
          merge-multiple: true
          path: artifacts

      - name: Stage downloaded artifacts into npm packages
        run: npm run prebuilt:artifacts

      - name: Verify local prebuilt install path
        run: npm run verify:prebuilt

      - name: List staged packages
        run: find npm -maxdepth 2 -type f | sort

      - name: Upload staged package directories
        uses: actions/upload-artifact@v4
        with:
          name: staged-prebuilt-packages
          path: npm
          if-no-files-found: error

  publish:
    name: Publish Prebuilt Packages
    if: ${{ inputs.publish }}
    runs-on: ubuntu-latest
    needs:
      - stage
    environment: release
    permissions:
      contents: read
      id-token: write
    env:
      npm_config_tag: ${{ inputs.npm-tag }}
      NPM_CONFIG_PROVENANCE: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Create optional package directories
        run: npm run prebuilt:dirs

      - name: Download prebuilt artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: prebuilt-*
          merge-multiple: true
          path: artifacts

      - name: Stage downloaded artifacts into npm packages
        run: npm run prebuilt:artifacts

      - name: Publish optional prebuilt packages and root package
        run: |
          npx napi pre-publish --tag-style npm --gh-release=false
          npm publish --tag "${npm_config_tag}" --access public
        shell: bash
